version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
    groups:
      radix-ui:
        patterns:
          - "@radix-ui/*"
      supabase:
        patterns:
          - "@supabase/*"
      testing:
        patterns:
          - "@testing-library/*"
          - "vitest"
          - "jsdom"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "ci"
