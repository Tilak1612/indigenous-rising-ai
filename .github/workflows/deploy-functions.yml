name: Deploy Supabase Edge Functions

on:
  push:
    branches: ["main"]
    paths:
      - "supabase/functions/**"
  workflow_dispatch:

jobs:
  deploy-functions:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy edge functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase functions deploy create-checkout --project-ref upxojfcdtmqtcvgbjsym --no-verify-jwt=false
          supabase functions deploy customer-portal --project-ref upxojfcdtmqtcvgbjsym --no-verify-jwt=false
          supabase functions deploy stripe-webhook --project-ref upxojfcdtmqtcvgbjsym --no-verify-jwt=false
          supabase functions deploy newsletter-subscribe --project-ref upxojfcdtmqtcvgbjsym --no-verify-jwt=false
          supabase functions deploy newsletter-unsubscribe --project-ref upxojfcdtmqtcvgbjsym --no-verify-jwt=false
          supabase functions deploy submit-contact --project-ref upxojfcdtmqtcvgbjsym --no-verify-jwt=false
          supabase functions deploy submit-data-request --project-ref upxojfcdtmqtcvgbjsym --no-verify-jwt=false
